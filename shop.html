<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kerich Pharmacy</title>
<link rel="icon" href="data:,">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
body{font-family:system-ui;margin:0;background:#f3f4f6;}
.nav{display:flex;justify-content:space-between;align-items:center;padding:15px 25px;background:#16a34a;color:white;position:sticky;top:0;}
.nav h3{margin:0;cursor:pointer;}
.nav a{margin-left:10px;cursor:pointer;color:white;text-decoration:none;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:15px;}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.05);}
.price{color:#16a34a;font-weight:bold;}
.qty{display:flex;gap:5px;margin:5px 0;}
.cart{position:fixed;right:-350px;top:0;width:320px;height:100%;background:white;padding:20px;transition:.3s;overflow:auto;z-index:999;}
.cart.open{right:0;}
.fab{position:fixed;bottom:20px;right:20px;background:#16a34a;color:white;padding:15px;border-radius:50px;cursor:pointer;z-index:1000;}
.badge{position:absolute;background:red;color:white;border-radius:50%;padding:3px 7px;font-size:12px;top:-5px;right:-5px;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:1001;}
.modal.open{display:flex;}
.modal-content{background:white;padding:20px;border-radius:10px;width:300px;}
.top-actions{display:flex;gap:5px;margin-bottom:10px;}
.top-actions button{flex:1;padding:8px;border:none;border-radius:5px;color:white;}
.call{background:#2563eb;}
.whatsapp{background:#25D366;}
/* ================= MOBILE MASTER FIX ================= */

/* NAV IMPROVEMENT */
.nav{
  flex-wrap:wrap;
}

.nav-right{
  display:flex;
  align-items:center;
  gap:10px;
}

.menu-btn{
  display:none;
  font-size:26px;
  cursor:pointer;
}

/* SEARCH FIX */
#search{
  padding:8px;
  border-radius:6px;
  border:none;
  outline:none;
}

/* MOBILE NAV */
@media(max-width:768px){

  .menu-btn{
    display:block;
  }

  .nav-right{
    width:100%;
    flex-direction:column;
    display:none;
    margin-top:10px;
    background:#16a34a;
    padding:10px;
    border-radius:10px;
  }

  .nav-right.active{
    display:flex;
  }

  #search{
    width:100%;
  }

  .nav a{
    width:100%;
    text-align:center;
    padding:8px;
  }
}

/* GRID FIX */
.grid{
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
}

/* CARD MOBILE */
@media(max-width:600px){
  .card{
    padding:20px;
  }
}

/* CART MOBILE */
@media(max-width:600px){
  .cart{
    width:100%;
  }
}

/* INPUTS FIX */
input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

/* BUTTONS BETTER TOUCH */
button{
  min-height:44px;
  cursor:pointer;
}

/* STOP SIDE SCROLL */
html,body{
  overflow-x:hidden;
}
/* ===== DESKTOP CART (unchanged feel) ===== */
.cart{
  position:fixed;
  right:-350px;
  top:0;
  width:320px;
  height:100%;
  background:white;
  padding:20px;
  transition:0.4s ease;
  overflow:auto;
  z-index:999;
  box-shadow:-5px 0 30px rgba(0,0,0,0.2);
}

.cart.open{
  right:0;
}

/* ===== MOBILE CART (FULL SCREEN / BOTTOM SHEET) ===== */
@media(max-width:600px){

  .cart{
    top:auto;
    bottom:-100%;
    left:0;
    right:0;
    width:100%;
    height:90%;
    border-radius:20px 20px 0 0;
    padding:15px;
    transition:0.4s ease;
  }

  .cart.open{
    bottom:0;
  }


}
.fab{
  bottom:15px;
  right:15px;
  padding:14px 18px;
  border-radius:30px;

}
/* SPLASH SCREEN */
#splash{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:#16a34a;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:2000;
  flex-direction:column;
  transition:0.6s;
}

#splash.hide{
  opacity:0;
  pointer-events:none;
}

.splash-content h1{
  font-size:2rem;
  margin:0;
}

.splash-content p{
  opacity:0.9;
}
/* PREMIUM LOOK */
.card{
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

button{
  background:#16a34a;
  color:white;
  border:none;
  border-radius:8px;
}

/* STOCK STATUS */
.stock{
  margin:5px 0;
  font-size:13px;
}

.stock.out{
  color:red;
  font-weight:bold;
}

/* CART UPGRADE */
.cart{
  border-top-left-radius:20px;
  border-bottom-left-radius:20px;
}

/* SCROLL SMOOTH */
html{
  scroll-behavior:smooth;
}
.cart{
  box-shadow:-5px 0 30px rgba(0,0,0,0.2);
}
.cart-handle{
  width:50px;
  height:5px;
  background:#ccc;
  border-radius:10px;
  margin:0 auto 10px;
}
#cartItems{
  max-height:40vh;
  overflow-y:auto;
}
.cart-bottom{
  position:sticky;
  bottom:0;
  background:white;
  padding-top:10px;
}
</style>
</head>
<body>
<div id="splash">
  <div class="splash-content">
    <h1>Kerich Pharmacy</h1>
    <p>Your health, delivered.</p>
  </div>
</div>
<div class="nav">
  <h3 onclick="goHome()">Kerich Pharmacy</h3>

  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="nav-right">
    <span id="welcome"></span>

    <input id="search" placeholder="Search..." oninput="searchProducts()">

    <a onclick="showLogin()" id="loginLink">Login</a>
    <a onclick="showRegister()" id="registerLink">Register</a>
    <a onclick="logout()" id="logoutLink" style="display:none;">Logout</a>

    <a href="consultations.html">Consultations</a>
  </div>
</div>

<script>
function goHome(){ window.location.href = "index.html"; }
</script>

<div class="grid" id="grid">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>

<!-- CART -->
<div class="cart" id="cart">
  <div class="cart-handle"></div>
  <div class="top-actions">
    <button class="call" onclick="callNow()">Call</button>
    <button class="whatsapp" onclick="whatsappNow()">WhatsApp</button>
  </div>
  <button onclick="toggleCart()">⬅ Back</button>
  <h3>Cart</h3>
  <div id="cartItems"></div>
  <div class="cart-bottom">
  <p><b>Total: KES <span id="total">0</span></b></p>
  <input id="phone" placeholder="Phone 2547...">
  <button onclick="placeOrder()">Checkout</button>
</div>
</div>

<div class="fab" onclick="toggleCart()">
  Cart <span id="cartCount" class="badge" style="display:none;">0</span>
</div>
<!-- LOGIN -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <h3>Login</h3>
    <div class="form-group">
      <input id="loginEmail" type="email" required>
      <label for="loginEmail">Email</label>
    </div>
    <div class="form-group">
      <input id="loginPassword" type="password" required>
      <label for="loginPassword">Password</label>
    </div>
    <div class="modal-actions">
      <button class="primary-btn" onclick="login()">Login</button>
      <button class="secondary-btn" onclick="document.getElementById('loginModal').classList.remove('open')">Back</button>
    </div>
    <p class="switch-text">
      Don't have an account? <span class="link" onclick="showRegister();document.getElementById('loginModal').classList.remove('open')">Register</span>
    </p>
  </div>
</div>

<!-- REGISTER -->
<div class="modal" id="registerModal">
  <div class="modal-content">
    <h3>Register</h3>
    <div class="form-group">
      <input id="regName" required>
      <label for="regName">Full Name</label>
    </div>
    <div class="form-group">
      <input id="regEmail" type="email" required>
      <label for="regEmail">Email</label>
    </div>
    <div class="form-group">
      <input id="regPhone" required>
      <label for="regPhone">Phone</label>
    </div>
    <div class="form-group">
      <input id="regAddress" required>
      <label for="regAddress">Address</label>
    </div>
    <div class="form-group">
      <input id="regPassword" type="password" required>
      <label for="regPassword">Password</label>
    </div>
    <div class="modal-actions">
      <button class="primary-btn" onclick="register()">Register</button>
      <button class="secondary-btn" onclick="document.getElementById('registerModal').classList.remove('open')">Back</button>
    </div>
    <p class="switch-text">
      Already have an account? <span class="link" onclick="showLogin();document.getElementById('registerModal').classList.remove('open')">Login</span>
    </p>
  </div>
</div>

<style>
/* --- Modal Container --- */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:2000;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.3s ease;
}
.modal.open{
  opacity:1;
  pointer-events:auto;
}

/* --- Modal Content --- */
.modal-content{
  background:white;
  padding:30px 25px;
  border-radius:20px;
  width:360px;
  max-width:90%;
  box-shadow:0 15px 50px rgba(0,0,0,0.3);
  transform: translateY(-30px);
  transition: transform 0.4s ease, opacity 0.4s ease;
  opacity:0;
}
.modal.open .modal-content{
  transform: translateY(0);
  opacity:1;
}

.modal-content h3{
  text-align:center;
  color:#16a34a;
  margin-bottom:25px;
  font-size:1.8rem;
  font-weight:bold;
}

/* --- Floating Labels --- */
.form-group{
  position:relative;
  margin-bottom:18px;
}
.form-group input{
  width:100%;
  padding:14px 12px 14px 12px;
  border-radius:10px;
  border:1px solid #ccc;
  outline:none;
  font-size:1rem;
  transition: border 0.3s, box-shadow 0.3s;
}
.form-group input:focus{
  border-color:#16a34a;
  box-shadow:0 0 10px rgba(22,163,74,0.3);
}
.form-group label{
  position:absolute;
  top:50%;
  left:12px;
  color:#999;
  font-size:1rem;
  pointer-events:none;
  transform: translateY(-50%);
  transition:0.3s ease all;
}
.form-group input:focus + label,
.form-group input:not(:placeholder-shown) + label{
  top:-8px;
  left:10px;
  font-size:0.8rem;
  background:white;
  padding:0 5px;
  color:#16a34a;
}

/* --- Buttons --- */
.modal-actions{
  display:flex;
  gap:12px;
  margin-top:15px;
}
.primary-btn{
  flex:1;
  background:#16a34a;
  color:white;
  border:none;
  padding:12px 0;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.primary-btn:hover{
  transform: translateY(-2px);
  box-shadow:0 8px 18px rgba(22,163,74,0.4);
}
.secondary-btn{
  flex:1;
  background:#ccc;
  color:#333;
  border:none;
  padding:12px 0;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.secondary-btn:hover{
  transform: translateY(-2px);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* --- Links --- */
.switch-text{
  text-align:center;
  margin-top:12px;
  font-size:14px;
  color:#555;
}
.switch-text .link{
  color:#16a34a;
  font-weight:bold;
  cursor:pointer;
  transition: text-decoration 0.2s;
}
.switch-text .link:hover{
  text-decoration:underline;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyATESqDeDuOOLjvEqZ9J8j58M59nQrbnmw",
  authDomain: "kerichpharma.firebaseapp.com",
  projectId: "kerichpharma",
  storageBucket: "kerichpharma.firebasestorage.app",
  messagingSenderId: "668206751685",
  appId: "1:668206751685:web:cc097cff689269378375ac",
  measurementId: "G-QDRBJ6S9PZ"
});

const db = getFirestore(app);

let medicines = [], cart = [], qtyMap = {}, currentUser = JSON.parse(localStorage.getItem("user")) || null;

/* LOAD PRODUCTS */
onSnapshot(collection(db,"inventory"), snap => {
  medicines = [];
  snap.docs.forEach(d => medicines.push({ id: d.id, ...d.data() }));
  render(medicines);
});

/* RENDER */
function render(list){
  const grid = document.getElementById("grid");
  let html = "";
  if(list.length === 0){
  grid.innerHTML = "<p style='text-align:center;'>No medicines found</p>";
  return;
}
list.forEach(m => {
  html += `
  <div class="card">
    <h4>${m.name}</h4>
    <div class="price">KES ${Math.round(m.price*130)}</div>

    <div class="stock ${m.stock <= 0 ? 'out' : ''}">
      ${m.stock <= 0 ? "Out of stock" : "Stock: " + m.stock}
    </div>

    <div class="qty">
      <button onclick="changeQty('${m.id}',-1)">-</button>
      <span id="q${m.id}">${qtyMap[m.id]||1}</span>
      <button onclick="changeQty('${m.id}',1)">+</button>
    </div>

    <button ${m.stock<=0 ? "disabled" : ""} 
      onclick="addToCart('${m.id}','${m.name}',${m.price},${m.stock})">
      ${m.stock<=0 ? "Unavailable" : "Add to Cart"}
    </button>
  </div>`;
});

grid.innerHTML = html;
  };


/* QTY */
window.changeQty = (id, d) => {
  let q = qtyMap[id] || 1;
  const p = medicines.find(m => m.id === id);
  q += d;
  if(q<1) q = 1;
  if(q>p.stock) q = p.stock;
  qtyMap[id] = q;
  document.getElementById("q"+id).innerText = q;
};

/* ADD CART */
window.addToCart = (id, name, price, stock) => {
  if(!currentUser){ alert("Login first"); showLogin(); return; }
  let q = qtyMap[id] || 1;
  const e = cart.find(i => i.id === id);
  if(e){ e.qty += q; } else { cart.push({id, name, price, qty:q}); }
  updateCart();
};

/* CART */
function updateCart(){
  const box = document.getElementById("cartItems");
  let total = 0;
  box.innerHTML = "";
  cart.forEach((c,i)=>{
    total += c.price * c.qty;
    box.innerHTML += `${c.name} x${c.qty} <button onclick="removeItem(${i})">x</button><br>`;
  });
  document.getElementById("total").innerText = Math.round(total*130);

  const badge = document.getElementById("cartCount");
  if(cart.length){
    badge.style.display = "inline";
    badge.innerText = cart.length;
  }else badge.style.display = "none";
}
window.removeItem = i => { cart.splice(i,1); updateCart(); };
window.toggleCart = () => document.getElementById("cart").classList.toggle("open");
window.searchProducts = () => render(medicines.filter(m => m.name.toLowerCase().includes(document.getElementById("search").value.toLowerCase())));
if(window.innerWidth < 600){
  document.getElementById("search").setAttribute("placeholder","Search medicine...");
}

/* CALL & WHATSAPP */
window.callNow = () => location.href = "tel:0708632005";
window.whatsappNow = () => window.open("https://wa.me/254708632005");

/* AUTH */
function hash(s){ return btoa(s); }

window.register = async () => {
  const name = document.getElementById("regName").value;
  const email = document.getElementById("regEmail").value;
  const phone = document.getElementById("regPhone").value;
  const address = document.getElementById("regAddress").value;
  const password = document.getElementById("regPassword").value;

  await addDoc(collection(db,"customers"), {
    name, email, phone, address, passwordHash: hash(password)
  });
  alert("Registered");
  document.getElementById("registerModal").classList.remove("open");
};

window.login = async () => {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  const qRef = query(collection(db,"customers"), where("email","==",email));
  const snap = await getDocs(qRef);
  if(snap.empty) return alert("User not found");

  const data = snap.docs[0].data();
  if(data.passwordHash !== hash(password)) return alert("Wrong password");

  currentUser = { id: snap.docs[0].id, ...data };
  localStorage.setItem("user", JSON.stringify(currentUser));
  document.getElementById("loginModal").classList.remove("open");
  updateNav();
};

window.logout = () => {
  currentUser = null;
  localStorage.removeItem("user");
  updateNav();
};

window.showLogin = () => document.getElementById("loginModal").classList.add("open");
window.showRegister = () => document.getElementById("registerModal").classList.add("open");

/* NAV */
function updateNav(){
  if(currentUser){
    document.getElementById("welcome").innerText = "Welcome "+currentUser.name;
    document.getElementById("loginLink").style.display="none";
    document.getElementById("registerLink").style.display="none";
    document.getElementById("logoutLink").style.display="inline";
    document.getElementById("phone").value = currentUser.phone;
  } else {
    document.getElementById("welcome").innerText = "";
    document.getElementById("loginLink").style.display="inline";
    document.getElementById("registerLink").style.display="inline";
    document.getElementById("logoutLink").style.display="none";
  }
}
updateNav();

/* ORDER */
window.placeOrder = async () => {
  if(!currentUser){ alert("Login first"); return; }
  if(cart.length === 0){ alert("Cart empty"); return; }

  const total = cart.reduce((s,i) => s + i.price*i.qty, 0);
  const phoneVal = document.getElementById("phone").value || currentUser.phone;
  const productNames = cart.map(i => i.name).join(", ");
  const totalQty = cart.reduce((s,i) => s + i.qty, 0);

  await addDoc(collection(db,"orders"),{
    customer:`${currentUser.name}, ${phoneVal}`,
    phone: phoneVal,
    product: productNames,
    qty: totalQty,
    items: cart,
    total: total,
    time: new Date().toLocaleString(),
    status:"pending",
    createdAt: serverTimestamp()
  });

  for(let i of cart){
    const p = medicines.find(m => m.id === i.id);
    await updateDoc(doc(db,"inventory",i.id), { stock: p.stock - i.qty });
  }

  alert("Order placed!");
  cart = [];
  updateCart();
};

</script>
<script>
function toggleMenu(){
  document.querySelector(".nav-right").classList.toggle("active");
}
</script>
<script>
window.addEventListener("load", ()=>{
  setTimeout(()=>{
    document.getElementById("splash").classList.add("hide");
  }, 1200);
});
</script>
</body>
</html>
